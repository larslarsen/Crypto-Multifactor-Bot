storage:
  root: /absolute/path/to/crypto-factor-data
  raw_dir: raw
  canonical_dir: canonical
  derived_dir: derived
  experiments_dir: experiments
  catalog_dir: catalog
  state_dir: state
  quarantine_dir: quarantine
  cache_dir: cache
  temp_dir: tmp

parquet:
  compression: zstd
  compression_level: 3
  target_file_mb: 192
  min_compaction_file_mb: 48
  max_file_mb: 384
  write_statistics: true
  initial_partitions:
    market_bars: [venue_id, market_type, timeframe, year, month]
    funding_cashflows: [venue_id, year, month]
    universe_snapshot: [universe_version, year]
    factor_value: [factor_version, year]
    label_return: [target_version, year]

raw:
  content_address_algorithm: sha256
  atomic_write: true
  preserve_original_filename_in_metadata: true
